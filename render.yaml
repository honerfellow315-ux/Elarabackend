services:
  - type: web
    name: elarawave-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_USER_SECRET
        generateValue: true
      - key: JWT_ADMIN_SECRET
        generateValue: true
      - key: JWT_USER_EXPIRES_IN
        value: 7d
      - key: JWT_ADMIN_EXPIRES_IN
        value: 12h
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: ELARA WAVE
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
